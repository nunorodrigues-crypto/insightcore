name: InsightKube — Relatório Diário de Hotelaria

on:
  workflow_dispatch:   # trigger manual para testar
  schedule:
    - cron: '0 17 * * *'   # todos os dias às 17h Lisboa (UTC)

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas fpdf requests

      # ── CLIENTE 1 ─────────────────────────────────────────────
      - name: Enviar relatório — Cliente 1
        env:
          GMAIL_USER:           ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD:       ${{ secrets.GMAIL_PASSWORD }}
          SHEET_URL_CLIENTE:    ${{ secrets.SHEET_URL_CLIENTE_1 }}
          CLIENTE_EMAIL:        ${{ nuno.rodrigues@insightkube.com}}
          CLIENTE_NOME:         ${{ secrets.CLIENTE_NOME_1 }}
          MERCADO_AVG:          "72"
        run: python auto_mailer.py

